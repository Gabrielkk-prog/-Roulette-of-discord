<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Roleta Premium</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="content">
    <div class="roleta-column">
      <div class="seta"></div>
      <div class="roleta-wrapper">
        <div id="roleta"></div>
        <div class="centro">Teen.</div>
      </div>
      <button id="girar">Girar</button>

        <ul id="lista-opcoes"></ul>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Roleta do João</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Roleta do João</h1>

    <div class="seta"></div>

    <div id="roleta"></div>

    <button id="girar">GIRAR</button>

    <p id="resultado"></p>

    <textarea id="entrada" placeholder="Digite opções separadas por vírgula"></textarea>
    <button id="salvar">Salvar Opções</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
